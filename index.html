<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  />
  <title>Agentforce Event Overlay</title>

  <!-- ===============================
       BASE LAYOUT STYLES
       =============================== -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Split layout */
    #agentforce-layout {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT: Event Overlay */
    #event-overlay-root {
      width: 70%;
      background: #f8fafc;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      padding: 32px;

      /* Visibility system (ONE ONLY) */
      transform: translateX(-100%);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    #event-overlay-root.visible {
      transform: translateX(0);
      opacity: 1;
    }

    /* RIGHT: Agentforce chat */
    #agentforce-chat-root {
      width: 30%;
      min-width: 380px;
      border-left: 1px solid #e5e7eb;
    }
  </style>
</head>

<body>
  <!-- ===============================
       MAIN CONTAINER
       =============================== -->
  <div id="agentforce-layout">
    <div id="event-overlay-root"></div>
    <div id="agentforce-chat-root"></div>
  </div>

  <!-- ===============================
       AGENTFORCE EMBEDDED CHAT
       =============================== -->
  <script type="text/javascript">
    function initEmbeddedMessaging() {
      try {
        embeddedservice_bootstrap.settings.language = "en_US";

        embeddedservice_bootstrap.init(
          "00DUD000008uiWS",
          "Event_Support_Agent_Messaging_Setting",
          "https://tdcerhverv--maagent.sandbox.my.site.com/ESWEventSupportAgentMe1775123382794",
          {
            scrt2URL:
              "https://tdcerhverv--maagent.sandbox.my.salesforce-scrt.com",
            targetElement:
              document.getElementById("agentforce-chat-root"),
          }
        );
      } catch (err) {
        console.error("Error loading Embedded Messaging:", err);
      }
    }
  </script>

  <script
    type="text/javascript"
    src="https://tdcerhverv--maagent.sandbox.my.site.com/ESWEventSupportAgentMe1775123382794/assets/js/bootstrap.min.js"
    onload="initEmbeddedMessaging()">
  </script>

  <!-- ===============================
       REACT EVENT OVERLAY (JS ONLY)
       =============================== -->
  <script
    type="module"
    src="https://tdc-campaign-event-overlay.netlify.app/assets/index-XXXX.js">
  </script>

  <!-- ===============================
       OPTIONAL: AUTO-SHOW OVERLAY
       =============================== -->
  <script>
    // Remove if you want chat-only by default
    document
      .getElementById("event-overlay-root")
      ?.classList.add("visible");
  </script>
</body>
</html>
