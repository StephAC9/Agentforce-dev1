  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Main split layout */
    #agentforce-layout {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT: React overlay */
    #event-overlay-root {
      width: 70%;
      background: #f8fafc;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      padding: 32px;
      display: none; /* hidden by default */
    }

    #event-overlay-root.visible {
      display: block;
    }

    /* Header inside overlay */
    .event-overlay-header h1 {
      margin: 0;
      font-size: 22px;
    }

    .event-overlay-header p {
      margin-top: 6px;
      color: #64748b;
    }

    /* RIGHT: Agentforce chat */
    #agentforce-chat-root {
      width: 30%;
      min-width: 380px;
      border-left: 1px solid #e5e7eb;
    }
  </style>

	<style>
  /* Overlay header with close button */
  .event-overlay-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .event-overlay-header h1 {
    margin: 0;
    font-size: 22px;
  }

  .event-overlay-header p {
    margin: 6px 0 0;
    color: #64748b;
  }

  .overlay-close-btn {
    background: transparent;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #64748b;
    padding: 4px 8px;
  }

  .overlay-close-btn:hover {
    color: #0f172a;
  }

#event-overlay-root {
  transition: transform 0.25s ease, opacity 0.25s ease;
}

#event-overlay-root.hidden {
  transform: translateX(-100%);
  opacity: 0;
  display: block;
}

#event-overlay-root.visible {
  transform: translateX(0);
  opacity: 1;
}
